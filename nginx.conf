server {
    listen 80;
    server_name localhost;

    # Servir la aplicación React estática
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Importante para React Router: si no encuentra el archivo, sirve index.html
        try_files $uri $uri/ /index.html;
    }

    # Redirigir peticiones a la API al contenedor del backend
    location /api/ {
        # 'backend' es el nombre del servicio en docker-compose.yml
        # No usamos slash al final para que envíe la ruta completa (e.g., /api/health)
        proxy_pass http://backend:5000;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
